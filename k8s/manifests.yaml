apiVersion: apps/v1
kind: Deployment
metadata:
  name: omni-bridge-orchestrator
  labels:
    app: omni-bridge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: omni-bridge
  template:
    metadata:
      labels:
        app: omni-bridge
    spec:
      containers:
      - name: orchestrator
        image: gcr.io/prompt-wars-bengaluru-2026/omni-bridge:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: GCP_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: omni-config
              key: project_id
        - name: ENVIRONMENT
          value: "production"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: omni-bridge-service
spec:
  type: LoadBalancer
  selector:
    app: omni-bridge
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omni-bridge-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omni-bridge-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
